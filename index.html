function getRoleLabel(roleId, industry) {
  var labels = INDUSTRY_ROLE_LABELS[industry];
  if (labels && labels[roleId]) return labels[roleId];
  for (var i = 0; i < ROLES.length; i++) {
    if (ROLES[i].id === roleId) return ROLES[i].label;
  }
  return roleId;
}

function getIndustryRoles(industry) {
  var specific = INDUSTRY_ROLE_PRIORITY[industry] || INDUSTRY_ROLE_PRIORITY['Other'];
  // Combine: industry-specific first (up to 6), then core roles, deduplicated
  var combined = [];
  var seen = {};
  var addRole = function(id) {
    if (!seen[id]) { seen[id] = true; combined.push(id); }
  };
  specific.forEach(addRole);
  CORE_ROLE_IDS.forEach(addRole);
  return combined.slice(0, 16);
}

function totPct() {
  var ar = allRoles();
  var sum = 0;

  return sum;
}

function getRole(id) {
  for (var i = 0; i < ROLES.length; i++) { if (ROLES[i].id === id) return ROLES[i]; }
  return null;
}

function calcComp() {
  var ar = allRoles();
  if (!ar.length) return 0;
  var g = getGeoAdj();
  var e = EXP[d.quals.exp] || 1;
  var p = PCT[d.mkt.pct] || 1;
  var w = 0;
  for (var i = 0; i < ar.length; i++) {
    var rid = ar[i];
    var r = getRole(rid);
    var base = r ? r.mm : 85000;
    var bk = (r ? r.occ : '') + '_' + d.biz.location;
    if (d.mkt.bls && d.mkt.bls[bk] && d.mkt.bls[bk].med) base = d.mkt.bls[bk].med;
    w += base * ((parseFloat(d.time[rid]) || 0) / 100);
  }
  var hrs = parseFloat(d.quals.hrs) || 40;
  var ha = hrs < 40 ? Math.min(hrs / 40, 1) : 1;
  var marketComp = Math.round(w * g * p * ha);

  // Net profit affordability cap
  var netProfit = parseInt((d.biz.netprofit || '0').replace(/\D/g,'')) || 0;
  if (netProfit > 0) {
    // Standard: reasonable comp = lesser of market rate or 70% of net profit
    var affordable = Math.round(netProfit * 0.70);
    return Math.min(marketComp, affordable);
  }
  return marketComp;
}

function marketComp() {
  var ar = allRoles();
  if (!ar.length) return 0;
  var g = getGeoAdj();
  var e = EXP[d.quals.exp] || 1;
  var p = PCT[d.mkt.pct] || 1;
  var w = 0;
  for (var i = 0; i < ar.length; i++) {
    var rid = ar[i];
    var r = getRole(rid);
    var base = r ? r.mm : 85000;
    var bk = (r ? r.occ : '') + '_' + d.biz.location;
    if (d.mkt.bls && d.mkt.bls[bk] && d.mkt.bls[bk].med) base = d.mkt.bls[bk].med;
    w += base * ((parseFloat(d.time[rid]) || 0) / 100);
  }
  var hrs = parseFloat(d.quals.hrs) || 40;
  var ha = hrs < 40 ? Math.min(hrs / 40, 1) : 1;
  return Math.round(w * g * p * ha);
}

function autoDistribute() {
  var ar = allRoles();
  if (!ar.length) return;
  // Round down to nearest 5%, first role absorbs remainder to reach 100%
  var each = Math.floor(Math.floor(100 / ar.length) / 5) * 5;
  if (each < 5) each = 5;
  var assigned = each * ar.length;
  var remainder = 100 - assigned;
  for (var i = 0; i < ar.length; i++) {
    d.time[ar[i]] = each + (i === 0 ? remainder : 0);
  }
}

async function fetchBLS() {
  var key = BLS_KEY;
  if (!key || key.length < 10) { toast('Enter BLS API key first'); return; }
  var ar = allRoles();
  if (!ar.length) { toast('Select roles first (Step 2)'); return; }
  var se = document.getElementById('blss');
  var re = document.getElementById('blsr');
  if (se) se.textContent = 'Fetching...';
  if (re) re.innerHTML = '<div style="padding:1rem;text-align:center;font-size:13px;color:#64748b">Querying BLS OEWS API...</div>';
  var ids = [];
  var map = {};
  for (var i = 0; i < ar.length; i++) {
    var rid = ar[i];
    var r = getRole(rid);
    if (!r) continue;
    var area = AREAS[d.biz.location] || '0000000';
    var sid = 'OEUS' + area + r.occ.replace('-', '') + '05';
    ids.push(sid);
    map[sid] = {rid: rid, r: r};
  }
  try {
    var res = await fetch(BLS_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({seriesid: ids, registrationkey: key, startyear: '2023', endyear: '2024'})
    });
    var json = await res.json();
    if (json.status === 'REQUEST_SUCCEEDED' || json.status === 'REQUEST_SUCCEEDED_WITH_MESSAGE') {
      var nb = JSON.parse(JSON.stringify(d.mkt.bls));
      var series = json.Results.series;
      for (var i = 0; i < series.length; i++) {
        var s = series[i];
        var meta = map[s.seriesID];
        if (!meta) continue;
        if (s.data && s.data.length > 0) {
          var l = s.data[0];
          var bk = meta.r.occ + '_' + d.biz.location;
          nb[bk] = {med: parseFloat(l.value) * 2080, period: l.period + ' ' + l.year};
        }
      }
      d.mkt.bls = nb;
      saveData(true);
      if (se) se.textContent = 'Live data loaded';
      renderBLS();
      toast('BLS data loaded');
    } else {
      var msg = (json.message && json.message.join) ? json.message.join(', ') : (json.status || 'Unknown error');
      if (re) re.innerHTML = '<div class="blserr">BLS API error: ' + msg + '</div>';
      if (se) se.textContent = 'Error';
    }
  } catch(e) {
    if (re) re.innerHTML = '<div class="blserr">Network error: ' + e.message + '<br><br>The BLS API blocks requests from local HTML files (CORS restriction). To use live BLS data, host this file on a web server. Your built-in baseline estimates are still active and powering the calculation.</div>';
    if (se) se.textContent = 'Not available locally';
  }
}

      function makeDonut(vals, hexCols, title) {

            ctx.closePath();
            ctx.fillStyle = hexCols[di % hexCols.length];
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;

            ang += sl;

          ctx.fillStyle = '#ffffff';
          ctx.fill();
          ctx.fillStyle = '#0f172a';
          ctx.font = 'bold 13px Arial';
          ctx.textAlign = 'center';

function renderProgress() {
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    var cls = i < cur ? 'done' : i === cur ? 'active' : '';
    var lbl = i < cur ? '&#10003;' : String(i+1);
    html += '<div class="sdot" onclick="goStep(' + i + ')">';
    html += '<div class="dot ' + cls + '">' + lbl + '</div>';
    html += '<div class="slabel">' + STEPS[i] + '</div>';
    html += '</div>';
  }
  document.getElementById('pbar').innerHTML = html;
  document.getElementById('pfill').style.width = Math.round((cur/6)*100) + '%';
}

function goStep(n) { if (n <= cur || n === cur + 1) { cur = n; render(); } }
function nav(dir) { cur = Math.max(0, Math.min(6, cur + dir)); render(); }

function stepMissing() {
  var id = STEP_IDS[cur];
  var missing = [];
  if (id === 'business') {
    if (!d.biz.name)     missing.push('Owner / shareholder name');
    if (!d.biz.bizname)  missing.push('Business name');
    if (!d.biz.industry) missing.push('Industry');
    if (!d.biz.entity)   missing.push('Entity type');
    if (!d.biz.location) {
      missing.push('Geographic market');
    } else if (d.biz.location === 'Custom Location' && !d.biz.geoAdj) {
      missing.push('Geographic wage adjustment (required for Custom Location)');
    }
  } else if (id === 'roles') {
    if (!d.roles.sel.length && !d.roles.custom.length) missing.push('At least one duty / role must be selected');
  } else if (id === 'time') {
    if (Math.round(totPct()) !== 100) missing.push('Time allocations must total exactly 100%');
  } else if (id === 'quals') {
    if (!d.quals.edu) missing.push('Education level');
    if (!d.quals.exp) missing.push('Years of experience');
  } else if (id === 'market') {
    if (!d.mkt.pct) missing.push('Percentile selection');
  }
  return missing;
}

function navBtns() {
  var back = cur > 0 ? '<button class="bbk" onclick="nav(-1)">&#8592; Back</button>' : '<div></div>';
  var next = '';
  var warn = '';
  if (cur < 6) {
    var missing = stepMissing();
    if (missing.length > 0) {
      var label = cur === 5 ? 'View Report' : 'Continue';
      var msgs = '';
      for (var mi = 0; mi < missing.length; mi++) {
        msgs += '<div style="margin-top:2px">&#8227; ' + missing[mi] + '</div>';
      }
      warn = '<div style="font-size:12px;color:#dc2626;font-weight:600;text-align:right;margin-bottom:6px">' + msgs + '</div>';
      next = '<button class="bnx" style="opacity:0.4;cursor:not-allowed" onclick="return false;">' + label + ' &#8594;</button>';

  // Guided percentile rationale — fill-in-the-blank walkthrough

function toggleLimit(lbl) {

  else d.mkt.qq.limits.push(lbl);
  buildRat();
  as();
  var sy = window.scrollY;

}

function buildRatNow(pct, ind, qq) {
  var name = ind || 'this industry';
  var hrs = (qq.hrs || '').trim();
  var creds = (qq.creds || '').trim();
  var replace = (qq.replace || '').trim();
  var limits = qq.limits || [];
  var limitsOther = (qq.limitsOther || '').trim();
  var rev = qq.rev || '';

  var pctLabel = {p25:'25th percentile', p50:'50th percentile (median)', p75:'75th percentile', p90:'90th percentile'}[pct] || pct;

  var sentences = [];

  // Opening sentence
  sentences.push('The ' + pctLabel + ' is appropriate for this owner operating in ' + name + '.');

  // Hours
  if (hrs) sentences.push('The owner works approximately ' + hrs + ' hours per week, which is consistent with the duties and compensation level at this percentile.');

  // Credentials
  if (creds) {
    var noCredPhrases = ['none','no license','no credential','no professional','not licensed','no cpa','no ea','no jd'];
    var hasNoCred = noCredPhrases.some(function(p) { return creds.toLowerCase().indexOf(p) >= 0; });
    if (hasNoCred) sentences.push('The owner does not hold a professional license or credential, which supports placement at or below the median.');
    else sentences.push('The owner holds the following credentials: ' + creds + '.');
  }

  // Limiting factors
  var allLimits = limits.slice();
  if (limitsOther) allLimits.push(limitsOther);
  if (allLimits.length > 0) {
    sentences.push('Factors supporting this percentile include: ' + allLimits.join('; ') + '.');
  }

  // Replaceability
  if (replace) sentences.push('A qualified replacement for this role in this market: ' + replace + '.');

  // Revenue dependency
  if (rev && rev.indexOf('No') === 0) {
    sentences.push('The business would continue to generate revenue without the owner in this specific role, which limits the compensation premium.');
  } else if (rev && rev.indexOf('Yes') === 0) {
    sentences.push('The owner is personally responsible for generating most business revenue, which is a factor supporting this placement.');
  }

  // Closing for low percentiles
  if (pct === 'p25' || pct === 'p50') {
    sentences.push('Based on these facts, a wage at or near the ' + pctLabel + ' is both reasonable and defensible under IRS facts-and-circumstances analysis.');
  }

  return sentences.join(' ');
}

function buildRat() {
  var assembled = buildRatNow(d.mkt.pct, d.biz.industry, d.mkt.qq||{});
  d.mkt.rat = assembled;
  var el = document.getElementById('rat-preview');

}

  html += '</div>';

  // Annual renewal note
  html += '<div style="font-size:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:0.75rem 1rem;color:#1e40af;line-height:1.6;margin-bottom:1.25rem">';
  html += '<strong>&#128197; Annual review recommended</strong> &mdash; This report is valid through ' + validThruStr + '. ';
  html += 'Reasonable compensation should be re-evaluated each year. Changes in owner duties, revenue, BLS wage data, or geographic market may affect the indicated figure.';
  html += '</div>';

  // Entity info summary
  html += '<div class="ss"><div class="st">Entity information</div>';
  html += '<div class="sr"><span style="color:#64748b">Business name</span><span class="sv">' + (d.biz.bizname||d.biz.name||'Not entered') + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">EIN</span><span class="sv">' + (d.biz.ein||'Not entered') + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Address</span><span class="sv">' + (d.biz.address||'Not entered') + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Owner / shareholder</span><span class="sv">' + (d.biz.name||'Not entered') + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Industry</span><span class="sv">' + d.biz.industry + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Entity type</span><span class="sv">' + d.biz.entity + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Employees</span><span class="sv">' + (d.biz.employees||'Not entered') + ' (supports management benchmarking)</span></div>';
  html += '</div>';

  // Financial summary — READ ONLY, pulled from earlier steps
  html += '<div class="ss"><div class="st">Company financial summary</div>';
  var fmRaw = function(v) {
    if (!v) return '<em style="color:#94a3b8">not entered</em>';
    var n = parseInt((v + '').replace(/\D/g, ''));
    return (!isNaN(n) && n >= 0) ? fm(n) : v;
  };
  html += '<div class="sr"><span style="color:#64748b">Gross revenue</span><span class="sv">' + fmRaw(d.biz.revenue) + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Net profit (before owner comp)</span><span class="sv">' + fmRaw(d.biz.netprofit) + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Owner W-2 wages this year</span><span class="sv">' + fmRaw(d.comp.w2) + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Owner distributions this year</span><span class="sv">' + fmRaw(d.comp.dist) + '</span></div>';
  if (w2 > 0 && dist > 0) {
    var rat = w2 / (w2 + dist) * 100;
    html += '<div style="font-size:12px;padding:8px 12px;border-radius:8px;margin-top:6px;background:' + (rat < 40 ? '#fee2e2' : '#f0fdf4') + ';color:' + (rat < 40 ? '#991b1b' : '#166534') + '">';
    html += 'Wages are ' + Math.round(rat) + '% of total owner compensation (' + fm(w2+dist) + '). ';
    if (rat < 40) html += 'Below 40% is a known IRS audit trigger.';
    else html += 'Ratio is within acceptable range.';
    html += '</div>';
  }
  if (!d.biz.revenue && !d.biz.netprofit) {
    html += '<div style="font-size:12px;color:#d97706;margin-top:6px">Go back to Step 1 to enter financial figures — they are needed in the PDF report.</div>';
  }
  html += '</div>';

  // Owner duty description — the ONE fillable field in the report
  html += '<div class="ss"><div class="st">Written owner duty description <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:#dbeafe;color:#1e40af;margin-left:4px">only editable field</span></div>';
  html += '<div style="font-size:12px;color:#64748b;margin-bottom:0.75rem;line-height:1.5">Write 3-5 sentences describing what this owner does day-to-day in plain English. The time allocation is shown automatically below. Together, these form the core of your IRS audit defense. Be specific about client types, staff managed, and key responsibilities.</div>';
  html += '<textarea style="width:100%;font-size:13px;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;color:#0f172a;height:120px;resize:vertical" oninput="d.rpt=d.rpt||{};d.rpt.dutyNarrative=this.value;as()" placeholder="e.g. As the sole owner-operator of a 3-person tax practice, I personally perform the following functions: (1) Tax preparation and review — I prepare and sign off on all complex business returns, S-Corp elections, and high-net-worth individual returns (approx. 50% of time). (2) Advisory and planning — I conduct annual tax planning meetings with 40+ business clients (20% of time). (3) Client relationship management — I am the primary point of contact for all A-tier clients (15% of time). (4) Staff supervision — I train, review work of, and manage two tax preparers (15% of time)...">' + ((d.rpt&&d.rpt.dutyNarrative)||'') + '</textarea>';
  html += '<div style="margin-top:0.75rem">';
  html += '<div class="fl" style="font-size:12px;color:#64748b;margin-bottom:6px">Time allocation summary (auto-filled from Step 3)</div>';
  for (var i = 0; i < ar.length; i++) {
    var r = getRole(ar[i]);
    html += '<div class="sr" style="font-size:12px"><span style="color:#64748b">' + (r ? r.label : ar[i]) + '</span><span class="sv">' + Math.round(d.time[ar[i]]||0) + '% of work time</span></div>';
  }
  html += '</div></div>';

  // Qualifications summary
  html += '<div class="ss"><div class="st">Owner qualifications</div>';
  html += '<div class="sr"><span style="color:#64748b">Education</span><span class="sv">' + d.quals.edu + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Credentials</span><span class="sv">' + (d.quals.creds||'None listed') + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Experience</span><span class="sv">' + d.quals.exp + '</span></div>';
  if (d.quals.spec) html += '<div class="sr"><span style="color:#64748b">Specialty</span><span class="sv">' + d.quals.spec + '</span></div>';
  html += '</div>';

  // Percentile rationale
  html += '<div class="ss"><div class="st">Market data and percentile rationale</div>';
  html += '<div class="sr"><span style="color:#64748b">Percentile selected</span><span class="sv">' + (PCTL[d.mkt.pct]||d.mkt.pct) + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">Geographic market</span><span class="sv">' + getLocationLabel() + '</span></div>';
  html += '<div class="sr"><span style="color:#64748b">BLS data</span><span class="sv">' + (blsCount > 0 ? '<span class="tg">Live BLS data used</span>' : '<span class="tw">Baseline estimates</span>') + '</span></div>';
  if (d.mkt.rat) html += '<div style="margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;font-size:13px;color:#64748b;line-height:1.6;font-style:italic">"' + d.mkt.rat + '"</div>';
  html += '</div>';

  // Exhibits — plain English instructions for each
  html += '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem;margin-top:0.5rem">';
  html += '<div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:0.25rem">4 documents to print and attach to this report</div>';
  html += '<div style="font-size:12px;color:#64748b;margin-bottom:1.25rem">These documents are what an IRS auditor will ask to see. Print them, staple them behind this report, and keep the complete package in your files.</div>';

  var exhibitDetails = [
    {
      num: '1',
      title: 'BLS wage data printout',
      what: 'This is a government wage table showing what people in your job title get paid in your city. The IRS uses this as the primary benchmark.',
      how: 'Go to <a href="https://www.bls.gov/oes/current/oes_nat.htm" target="_blank" style="color:#2563eb">bls.gov/oes</a> → click your state or metro area → find each occupation title you selected → print or screenshot the wage table showing the 25th, median, and 75th percentile columns.',
      badge: 'Required'
    },
    {
      num: '2',
      title: 'Compensation survey printout',
      what: 'A second data source that confirms the BLS numbers. The IRS likes to see more than one source. RCReports is the most commonly accepted tool among tax professionals for this purpose.',
      how: '<a href="https://rcreports.com" target="_blank" style="color:#2563eb">RCReports.com</a> charges a per-report fee (~$50-100) and produces a formatted report specifically designed for IRS reasonable comp. Alternatively, <a href="https://erieri.com" target="_blank" style="color:#2563eb">ERI (erieri.com)</a> or a free salary search from <a href="https://salary.com" target="_blank" style="color:#2563eb">Salary.com</a> can supplement the BLS data.',
      badge: 'Strongly recommended'
    },
    {
      num: '3',
      title: 'Credential documentation',
      what: 'A copy of each professional license or credential listed in this report. This proves the credentials are real and active.',
      how: 'Print or save a PDF of your license lookup page from your state licensing board, the IRS EA verification page, bar association directory, etc. Include license number and expiration date.',
      badge: 'If credentials listed'
    },
    {
      num: '4',
      title: 'Compensation agreement',
      what: 'A signed document between the owner and the corporation stating the agreed salary. This shows the wage was set deliberately, not arbitrarily.',
      how: 'This is a simple one-page document signed by the owner in their corporate officer role. Your corporate attorney or accountant can draft it, or use a template. It should state the annual salary, effective date, and be signed before the fiscal year ends.',
      badge: 'Best practice'
    }
  ];

  for (var ei = 0; ei < exhibitDetails.length; ei++) {
    var ex = exhibitDetails[ei];
    html += '<div style="margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e2e8f0">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
    html += '<div style="width:22px;height:22px;border-radius:50%;background:#1a4a8a;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + ex.num + '</div>';
    html += '<div style="font-size:13px;font-weight:700;color:#0f172a">' + ex.title + '</div>';
    html += '<div style="font-size:10px;padding:2px 8px;border-radius:10px;background:#dbeafe;color:#1e40af;font-weight:600">' + ex.badge + '</div>';
    html += '</div>';
    html += '<div style="font-size:12px;color:#0f172a;margin-bottom:4px;margin-left:30px"><strong>What it is:</strong> ' + ex.what + '</div>';
    html += '<div style="font-size:12px;color:#64748b;margin-left:30px"><strong>How to get it:</strong> ' + ex.how + '</div>';
    html += '</div>';
  }
  html += '</div>';

  html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:1.25rem">';
  html += '<button id="pdfbtn" class="pdfb" onclick="exportPDF()">Export PDF report</button>';
  html += '</div></div>';
  return html;
}

function render() {
  renderProgress();
  var id = STEP_IDS[cur];
  var content = '';
  if (id === 'business') content = renderBusiness();
  else if (id === 'roles')  content = renderRoles();
  else if (id === 'time')   content = renderTime();
  else if (id === 'quals')  content = renderQuals();
  else if (id === 'market') content = renderMarket();
  else if (id === 'calc')   content = renderCalc();
  else if (id === 'report') content = renderReport();
  document.getElementById('sc').innerHTML = content + navBtns();
  if (id === 'market') renderBLS();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

loadSaved();
render();
</script>
</body>
</html>
